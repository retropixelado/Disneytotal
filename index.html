<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Secreto de Marco</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Baloo 2',cursive;
background:#0a1633;
color:white;
text-align:center;
}

h1{
margin:20px;
}

#mapa{
position:relative;
max-width:1000px;
margin:auto;
}

#mapa img{
width:100%;
border-radius:15px;
}

.punto{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:gold;
border:3px solid white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
transition:0.2s;
}

.punto:hover{
transform:scale(1.2);
}

.completado{
background:#00ff88;
}

#panel{
margin-top:20px;
font-size:20px;
}

.logro{
margin:10px;
font-size:22px;
}

</style>
</head>

<body>

<h1>🗺️ Mapa de Aventuras de Marco</h1>

<div id="mapa">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Disneyland_Paris_Map.jpg">

<div class="punto" style="top:60%; left:40%" onclick="marcar(this,'Big Thunder')">1</div>

<div class="punto" style="top:55%; left:55%" onclick="marcar(this,'Piratas')">2</div>

<div class="punto" style="top:40%; left:70%" onclick="marcar(this,'Hyperspace')">3</div>

<div class="punto" style="top:45%; left:50%" onclick="marcar(this,'Phantom Manor')">4</div>

</div>

<div id="panel">

<div>
Atracciones completadas: <span id="contador">0</span>
</div>

<div id="logros"></div>

</div>

<script>

let total=0

function marcar(punto, nombre){

if(punto.classList.contains("completado"))
return

punto.classList.add("completado")

total++

document.getElementById("contador").innerText=total

let logros=""

if(total>=1)
logros+="⭐ Primera aventura completada<br>"

if(total>=2)
logros+="🏴‍☠️ Pirata oficial del parque<br>"

if(total>=3)
logros+="🚀 Cadete espacial<br>"

if(total>=4)
logros+="🏆 ¡Marco ha conquistado el parque!<br>"

document.getElementById("logros").innerHTML=logros

alert("Atracción conquistada: "+nombre)

}

</script>

</body>
</html>
